<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TournamentHub | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .redirect-box {
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .logo span { color: #39ff14; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(57, 255, 20, 0.2);
            border-top-color: #39ff14;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #8892a4; font-size: 0.95rem; }
        a { color: #39ff14; }
    </style>
</head>

<body>
    <div class="redirect-box">
        <div class="logo">🏆 Tournament<span>Hub</span></div>
        <div class="spinner"></div>
        <p id="msg">Checking your session...</p>
    </div>

    <script>
        (function () {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');

            if (!token || !user) {
                document.getElementById('msg').innerHTML = 'Not logged in. <a href="login.html">Sign in</a>';
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                return;
            }

            // Route by role
            if (user.role === 'organizer') {
                window.location.replace('organizer-dashboard.html');
            } else {
                window.location.replace('participant-dashboard.html');
            }
        })();
    </script>
</body>

</html>
