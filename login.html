<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TournamentHub | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, rgba(57, 255, 20, 0.05) 0%, var(--bg-dark) 60%);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .role-btn.active {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            font-size: 1.1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-green);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container glass-card fade-in-up">
        <div class="auth-header">
            <div class="logo" style="justify-content: center; margin-bottom: 10px;">
                <span style="font-size: 1.5rem;">🏆</span> Tournament<span class="text-accent">Hub</span>
            </div>
            <h2>Welcome Back</h2>
            <p>Enter your details to access your account</p>
        </div>

        <div class="role-selector">
            <button class="role-btn active" data-role="participant">Participant</button>
            <button class="role-btn" data-role="organizer">Organizer</button>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="glass-input" placeholder="player@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="glass-input" placeholder="••••••••" required>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;">
                <label style="display: flex; align-items: center; gap: 8px; color: var(--text-muted);">
                    <input type="checkbox" style="accent-color: var(--accent-green);"> Remember me
                </label>
                <a href="#" class="text-accent">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary submit-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="#">Create Account</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const roleBtns = document.querySelectorAll('.role-btn');
            let selectedRole = 'participant';

            roleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    roleBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedRole = btn.getAttribute('data-role');
                });
            });

            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                // Add a small delay for animation effect
                const submitBtn = loginForm.querySelector('.submit-btn');
                submitBtn.innerHTML = 'Connecting...';
                submitBtn.style.opacity = '0.8';

                setTimeout(() => {
                    if (selectedRole === 'participant') {
                        window.location.href = 'participant-dashboard.html';
                    } else {
                        window.location.href = 'organizer-dashboard.html';
                    }
                }, 800);
            });
        });
    </script>
</body>

</html>
